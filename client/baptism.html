<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Baptism | Baptism Class Tracker</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body class="app-page">
    <div class="app-shell">
      <aside class="app-sidebar">
        <h2 class="sidebar-title">Baptism Tracker</h2>
        <nav class="sidebar-nav">
          <a class="nav-link" data-page="dashboard" href="./index.html">Dashboard</a>
          <a class="nav-link" data-page="participants" href="./participants.html">Participants</a>
          <a class="nav-link" data-page="classes" href="./classes.html">Classes</a>
          <a class="nav-link" data-page="attendance" href="./attendance.html">Attendance</a>
          <a class="nav-link" data-page="baptism" href="./baptism.html">Baptism</a>
          <a class="nav-link" data-page="reports" href="./reports.html">Reports</a>
        </nav>
      </aside>

      <main class="app-main">
        <section class="container app-container">
          <header class="topbar">
            <h1>Baptism Schedule</h1>
            <div class="actions">
              <span id="userEmail" class="muted"></span>
              <button id="logoutBtn" type="button">Logout</button>
            </div>
          </header>

          <p id="status" class="status"></p>

      <form id="baptismForm" class="form-grid">
        <input id="scheduleId" name="scheduleId" type="hidden" />
        <div class="stack">
          <label for="scheduleParticipantId">Participant ID</label>
          <input id="scheduleParticipantId" name="participant_id" type="text" required />
        </div>
        <div class="stack">
          <label for="baptismDate">Date</label>
          <input id="baptismDate" name="baptism_date" type="date" required />
        </div>
        <div class="stack">
          <label for="baptismTime">Time</label>
          <input id="baptismTime" name="baptism_time" type="time" required />
        </div>
        <div class="stack">
          <label for="baptismLocation">Location</label>
          <input id="baptismLocation" name="location" type="text" required />
        </div>
        <div class="stack">
          <label for="baptismStatus">Status</label>
          <select id="baptismStatus" name="status" required>
            <option value="scheduled">scheduled</option>
            <option value="completed">completed</option>
            <option value="postponed">postponed</option>
            <option value="cancelled">cancelled</option>
          </select>
        </div>
        <div class="actions">
          <button id="saveBaptismBtn" type="submit">Save Schedule</button>
          <button id="clearBaptismBtn" type="button">Clear</button>
        </div>
      </form>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Participant ID</th>
                  <th>Date</th>
                  <th>Time</th>
                  <th>Location</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="baptismBody"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
    <script src="./js/config.js"></script>
    <script type="module" src="./js/baptismPage.js"></script>
  </body>
</html>
