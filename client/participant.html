<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Participant Profile | Baptism Class Tracker</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body class="app-page">
    <div class="app-shell">
      <aside class="app-sidebar">
        <h2 class="sidebar-title">Baptism Tracker</h2>
        <nav class="sidebar-nav">
          <a class="nav-link" data-page="dashboard" href="./index.html">Dashboard</a>
          <a class="nav-link" data-page="participants" href="./participants.html">Participants</a>
          <a class="nav-link" data-page="classes" href="./classes.html">Classes</a>
          <a class="nav-link" data-page="attendance" href="./attendance.html">Attendance</a>
          <a class="nav-link" data-page="attendance_session" href="./attendance_session.html">Session</a>
          <a class="nav-link" data-page="baptism" href="./baptism.html">Baptism</a>
          <a class="nav-link" data-page="requirements" href="./requirements.html">Requirements</a>
          <a class="nav-link" data-page="reports" href="./reports.html">Reports</a>
        </nav>
      </aside>

      <main class="app-main">
        <section class="container app-container">
          <header class="topbar">
            <h1 id="profileTitle">Participant</h1>
            <div class="actions">
              <span id="userEmail" class="muted"></span>
              <button id="logoutBtn" type="button">Logout</button>
            </div>
          </header>

          <p id="status" class="status"></p>

          <section class="row">
            <article class="card">
              <p class="muted">Contact</p>
              <p id="profileContact">-</p>
            </article>
            <article class="card">
              <p class="muted">Date of Birth</p>
              <p id="profileDob">-</p>
            </article>
            <article class="card">
              <p class="muted">Enrolled</p>
              <p id="profileEnrolled">-</p>
            </article>
          </section>

          <h2 class="section-heading">Baptism schedule</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Time</th>
                  <th>Location</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="profileBaptismBody"></tbody>
            </table>
          </div>

          <h2 class="section-heading">Attendance</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Class ID</th>
                  <th>Status</th>
                  <th>Marked At</th>
                </tr>
              </thead>
              <tbody id="profileAttendanceBody"></tbody>
            </table>
          </div>

          <h2 class="section-heading">Requirements</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Status</th>
                  <th>Verified At</th>
                  <th>Notes</th>
                </tr>
              </thead>
              <tbody id="profileRequirementsBody"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
    <script src="./js/config.js"></script>
    <script type="module" src="./js/participantPage.js"></script>
  </body>
</html>
