<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Requirements | Baptism Class Tracker</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body class="app-page">
    <div class="app-shell">
      <aside class="app-sidebar">
        <h2 class="sidebar-title">Baptism Tracker</h2>
        <nav class="sidebar-nav">
          <a class="nav-link" data-page="dashboard" href="./index.html">Dashboard</a>
          <a class="nav-link" data-page="participants" href="./participants.html">Participants</a>
          <a class="nav-link" data-page="classes" href="./classes.html">Classes</a>
          <a class="nav-link" data-page="attendance" href="./attendance.html">Attendance</a>
          <a class="nav-link" data-page="attendance_session" href="./attendance_session.html">Session</a>
          <a class="nav-link" data-page="baptism" href="./baptism.html">Baptism</a>
          <a class="nav-link" data-page="requirements" href="./requirements.html">Requirements</a>
          <a class="nav-link" data-page="reports" href="./reports.html">Reports</a>
        </nav>
      </aside>

      <main class="app-main">
        <section class="container app-container">
          <header class="topbar">
            <h1>Requirements</h1>
            <div class="actions">
              <span id="userEmail" class="muted"></span>
              <button id="logoutBtn" type="button">Logout</button>
            </div>
          </header>

          <p id="status" class="status"></p>

          <form id="requirementForm" class="form-grid">
            <input id="requirementId" name="requirementId" type="hidden" />
            <div class="stack">
              <label for="reqParticipantId">Participant</label>
              <select id="reqParticipantId" name="participant_id" required>
                <option value="">Select participant</option>
              </select>
            </div>
            <div class="stack">
              <label for="requirementName">Requirement</label>
              <input id="requirementName" name="requirement_name" type="text" required />
            </div>
            <div class="stack">
              <label for="requirementStatus">Status</label>
              <select id="requirementStatus" name="requirement_status" required>
                <option value="pending">pending</option>
                <option value="completed">completed</option>
                <option value="waived">waived</option>
              </select>
            </div>
            <div class="stack">
              <label for="requirementNotes">Notes</label>
              <input id="requirementNotes" name="notes" type="text" />
            </div>
            <div class="actions">
              <button id="saveRequirementBtn" type="submit">Save Requirement</button>
              <button id="clearRequirementBtn" type="button">Clear</button>
            </div>
          </form>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Participant</th>
                  <th>Requirement</th>
                  <th>Status</th>
                  <th>Verified At</th>
                  <th>Notes</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="requirementsBody"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>
    <script src="./js/config.js"></script>
    <script type="module" src="./js/requirementsPage.js"></script>
  </body>
</html>
