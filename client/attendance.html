<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Attendance | Baptism Class Tracker</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body class="app-page">
    <div class="app-shell">
      <aside class="app-sidebar">
        <h2 class="sidebar-title">Baptism Tracker</h2>
        <nav class="sidebar-nav" aria-label="Main">
          <div class="nav-group">
            <span class="nav-group-label">Overview</span>
            <a class="nav-link" data-page="dashboard" href="./index.html">Dashboard</a>
            <a class="nav-link" data-page="reports" href="./reports.html">Reports</a>
          </div>
          <div class="nav-group">
            <span class="nav-group-label">Program</span>
            <a class="nav-link" data-page="classes" href="./classes.html">Classes</a>
            <a class="nav-link" data-page="attendance" href="./attendance.html">Attendance</a>
            <a class="nav-link" data-page="attendance_session" href="./attendance_session.html">Session</a>
            <a class="nav-link" data-page="baptism" href="./baptism.html">Baptism</a>
          </div>
          <div class="nav-group">
            <span class="nav-group-label">People</span>
            <a class="nav-link" data-page="participants" href="./participants.html">Participants</a>
            <a class="nav-link" data-page="requirements" href="./requirements.html">Requirements</a>
          </div>
        </nav>
      </aside>

      <main class="app-main">
        <section class="container app-container">
          <header class="topbar">
            <h1>Attendance</h1>
            <div class="actions">
              <span id="userEmail" class="muted"></span>
              <button id="logoutBtn" type="button">Logout</button>
            </div>
          </header>

          <p id="status" class="status"></p>
          <p class="muted">
            Need roll call for a whole class?
            <a href="./attendance_session.html">Open Attendance Session</a>.
          </p>

      <form id="attendanceForm" class="form-grid">
        <input id="attendanceId" name="attendanceId" type="hidden" />
        <div class="stack">
          <label for="participantId">Participant</label>
          <select id="participantId" name="participant_id" required>
            <option value="">Select participant</option>
          </select>
        </div>
        <div class="stack">
          <label for="classId">Class</label>
          <select id="classId" name="class_id" required>
            <option value="">Select class</option>
          </select>
        </div>
        <div class="stack">
          <label for="attendanceStatus">Status</label>
          <select id="attendanceStatus" name="attendance_status" required>
            <option value="present">present</option>
            <option value="absent">absent</option>
            <option value="late">late</option>
            <option value="excused">excused</option>
          </select>
        </div>
        <div class="actions">
          <button id="saveAttendanceBtn" type="submit">Save Attendance</button>
          <button id="clearAttendanceBtn" type="button">Clear</button>
        </div>
      </form>

      <form id="attendanceFilterForm" class="form-grid">
        <div class="stack">
          <label for="filterParticipantId">Filter Participant</label>
          <select id="filterParticipantId" name="participant_id">
            <option value="">All participants</option>
          </select>
        </div>
        <div class="stack">
          <label for="filterClassId">Filter Class</label>
          <select id="filterClassId" name="class_id">
            <option value="">All classes</option>
          </select>
        </div>
        <div class="stack">
          <label for="filterAttendanceStatus">Filter Status</label>
          <select id="filterAttendanceStatus" name="attendance_status">
            <option value="">All statuses</option>
            <option value="present">present</option>
            <option value="absent">absent</option>
            <option value="late">late</option>
            <option value="excused">excused</option>
          </select>
        </div>
        <div class="stack">
          <label for="markedFrom">Marked From</label>
          <input id="markedFrom" name="marked_from" type="date" />
        </div>
        <div class="stack">
          <label for="markedTo">Marked To</label>
          <input id="markedTo" name="marked_to" type="date" />
        </div>
        <div class="actions">
          <button type="submit">Apply</button>
          <button id="resetAttendanceFiltersBtn" type="button">Reset</button>
        </div>
      </form>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Participant ID</th>
                  <th>Class ID</th>
                  <th>Status</th>
                  <th>Marked At</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="attendanceBody"></tbody>
            </table>
          </div>

          <div class="pagination-bar">
            <div class="pagination-meta">
              <span id="pageInfo" class="muted"></span>
            </div>
            <div class="pagination-controls">
              <label class="inline-label" for="pageSize">Page size</label>
              <select id="pageSize">
                <option value="10">10</option>
                <option value="25" selected>25</option>
                <option value="50">50</option>
              </select>
              <button id="prevPageBtn" type="button" disabled>Previous</button>
              <button id="nextPageBtn" type="button" disabled>Next</button>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script src="./js/config.js"></script>
    <script type="module" src="./js/attendancePage.js"></script>
  </body>
</html>
